# GROUP 不配置默认使用 DEFAULT_GROUP。
spring:
  application:
    name: dubbo-provider
  cloud:
    nacos:
      config:
        serverAddr: 172.16.6.77:8848
        namespace: 79ec2bf2-77da-40a4-a877-a05dcadea95d
  config:
    import:
      - nacos:dubbo-provider.yaml?group=CLOUD_GROUP
dubbo:
  application:
    name: dubbo-provider
    register-mode: instance
  protocol:
    name: tri
    port: -1
  registry:
    address: nacos://172.16.6.77:8848?namespace=${spring.cloud.nacos.config.namespace}
